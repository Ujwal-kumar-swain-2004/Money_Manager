# ===============================
# LOCAL PROFILE
# Uses Docker PostgreSQL and Docker Redis.
# Run with:
#   docker compose up -d db redis
#   mvn spring-boot:run
# ===============================

# Docker PostgreSQL from docker-compose.yml.
# Use LOCAL_DB_* so production DB_URL values cannot accidentally hijack local runs.
spring.datasource.url=${LOCAL_DB_URL:jdbc:postgresql://localhost:5439/moneymanager}
spring.datasource.username=${LOCAL_DB_USERNAME:postgres}
spring.datasource.password=${LOCAL_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Local development can update schema automatically.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false

# Docker Redis from docker-compose.yml
spring.cache.type=${CACHE_TYPE:redis}
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.data.redis.repositories.enabled=false

# Local URLs
money.manager.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.activation.url=${BACKEND_URL:http://localhost:8080}
