# ===============================
# SERVER
# ===============================
server.port=${PORT:8080}
server.servlet.context-path=/api/v1.0

# ===============================
# DATABASE
# Use Render environment variables. Do not hard-code Neon secrets here.
# Recommended DB_URL format:
# jdbc:postgresql://ep-raspy-brook-aqhgiv5i-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Keep the pool small for Neon free tier / Render starter instances.
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}

# ===============================
# JPA
# For first deploy, update creates missing tables/indexes.
# Later production should use Flyway/Liquibase and change this to validate.
# ===============================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ===============================
# MAIL (BREVO)
# ===============================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_LOGIN:}
spring.mail.password=${BREVO_SMTP_KEY:}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp-relay.brevo.com
spring.mail.properties.mail.smtp.from=${BREVO_FROM_EMAIL:noreply@moneymanager.com}

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET}

# ===============================
# APP URLS
# ===============================
money.manager.frontend.url=${FRONTEND_URL}
app.activation.url=${BACKEND_URL}

# ===============================
# SPRING AI (OPENAI)
# Disabled in prod by default so Render can start without an OpenAI key.
# The app still returns local fallback financial insights.
# ===============================
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
spring.cloud.function.scan.enabled=false
