# ===============================
# SERVER
# ===============================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
server.port=${PORT:8080}
server.servlet.context-path=/api/v1.0

# ===============================
# JPA
# ===============================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# CACHE TTL DEFAULTS
# ===============================
spring.cache.redis.key-prefix=moneymanager:
spring.cache.redis.use-key-prefix=true
app.cache.dashboard-ttl-minutes=${DASHBOARD_CACHE_TTL_MINUTES:5}
app.cache.money-plan-ttl-minutes=${MONEY_PLAN_CACHE_TTL_MINUTES:5}
app.cache.categories-ttl-minutes=${CATEGORIES_CACHE_TTL_MINUTES:30}

# ===============================
# MAIL DEFAULTS
# ===============================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_LOGIN:}
spring.mail.password=${BREVO_SMTP_KEY:}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp-relay.brevo.com
spring.mail.properties.mail.smtp.from=${BREVO_FROM_EMAIL:noreply@moneymanager.com}

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET:local-development-secret-that-is-long-enough-32}

# ===============================
# APP URLS
# ===============================
money.manager.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.activation.url=${BACKEND_URL:http://localhost:8080}

spring.cloud.function.scan.enabled=false
