# ===============================
# SERVER
# ===============================
server.port=${PORT:8080}
server.servlet.context-path=/api/v1.0

# ===============================
# DATABASE
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# MAIL (BREVO)
# ===============================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_LOGIN}
spring.mail.password=${BREVO_SMTP_KEY}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp-relay.brevo.com
spring.mail.properties.mail.smtp.from=${BREVO_FROM_EMAIL}

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET}

# ===============================
# APP URLS
# ===============================
money.manager.frontend.url=${FRONTEND_URL}
app.activation.url=${BACKEND_URL}

# ===============================
# SPRING AI (OPENAI)
# ===============================
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.4
spring.cloud.function.scan.enabled=false
